# docker/nginx.conf
# Configuração Nginx como reverse proxy com SSL para produção
# Substitua api.seudominio.com pelo seu domínio real

server {
    listen 80;
    server_name api.seudominio.com;

    # Redireciona HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.seudominio.com;

    # Certificados SSL — gere com: certbot --nginx -d api.seudominio.com
    ssl_certificate     /etc/letsencrypt/live/api.seudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.seudominio.com/privkey.pem;

    # Protocolos seguros
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # Headers de segurança (complementam o Helmet do Node.js)
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    # Tamanho máximo do body (para import de contatos)
    client_max_body_size 10M;

    location / {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeout maior para campanhas grandes
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Rota do webhook com timeout maior (Meta pode demorar em verificação)
    location /api/v1/webhook/meta {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Logs
    access_log /var/log/nginx/whatsapp-api-access.log;
    error_log  /var/log/nginx/whatsapp-api-error.log;
}
